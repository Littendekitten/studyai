<div class="flex bg-slate-800/50 rounded-xl p-1 mb-6 no-print w-fit mx-auto border border-white/10">
    <button onclick="setMode('worksheet')" id="mode-ws" class="px-4 py-2 rounded-lg text-sm font-bold bg-indigo-600 text-white transition-all flex items-center gap-2">
        <i data-lucide="file-text" class="w-4 h-4"></i> Worksheet
    </button>
    <button onclick="setMode('learning')" id="mode-lr" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 transition-all flex items-center gap-2">
        <i data-lucide="graduation-cap" class="w-4 h-4"></i> Learning Mode
    </button>
</div>

<script>
    let currentMode = 'worksheet'; // Standaard modus
    let chatHistory = []; // Voor de Learning Mode om context te onthouden

    function setMode(mode) {
        currentMode = mode;
        const wsBtn = document.getElementById('mode-ws');
        const lrBtn = document.getElementById('mode-lr');
        const welcome = document.getElementById('welcome-box');

        if(mode === 'learning') {
            lrBtn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-indigo-600 text-white transition-all flex items-center gap-2";
            wsBtn.className = "px-4 py-2 rounded-lg text-sm font-bold text-slate-400 transition-all flex items-center gap-2";
            welcome.innerText = currentLang === 'nl' ? "Learning Mode: Typ een onderwerp en ik ga je overhoren!" : "Learning Mode: Type a topic and I will quiz you!";
        } else {
            wsBtn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-indigo-600 text-white transition-all flex items-center gap-2";
            lrBtn.className = "px-4 py-2 rounded-lg text-sm font-bold text-slate-400 transition-all flex items-center gap-2";
            welcome.innerText = currentLang === 'nl' ? "Typ een onderwerp waar je een werkblad over wilt..." : "Type a topic for your worksheet...";
        }
        document.getElementById('chat-output').innerHTML = '';
        chatHistory = []; // Reset geschiedenis bij mode-switch
    }

    async function askGemini(retryCount = 0) {
        const input = document.getElementById('user-input');
        const output = document.getElementById('chat-output');
        const text = input.value.trim();
        if(!text) return;

        // In Learning Mode laten we het gesprek staan, in Worksheet Mode maken we het leeg
        if(currentMode === 'worksheet' && retryCount === 0) output.innerHTML = '';
        if(currentMode === 'learning' && retryCount === 0) appendMessage('user', text);
        
        input.value = '';

        const availableKeys = API_KEYS.filter(k => !blockedKeys.has(k));
        const selectedKey = availableKeys[Math.floor(Math.random() * availableKeys.length)];
        const loadingId = appendStatus(currentLang === 'nl' ? "AI denkt na..." : "AI is thinking...", "text-indigo-400 animate-pulse no-print");

        try {
            let prompt = "";
            if(currentMode === 'worksheet') {
                prompt = content[currentLang]['prompt_' + currentSubject] + text;
            } else {
                // De "Learning Mode" Prompt instructie
                prompt = `You are a personal tutor for ${currentSubject}. 
                If this is the first message, start by asking 1 challenging question about "${text}". 
                If the user answers a question, check if it is correct. 
                If correct: explain why and ask the next question. 
                If wrong: give a subtle hint (don't give the answer yet) and let them try again. 
                Keep it interactive and one question at a time. Language: ${currentLang}.
                Context so far: ${JSON.stringify(chatHistory)}`;
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${selectedKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt + " (User input: " + text + ")" }] }] })
            });
            
            const data = await response.json();
            document.getElementById(loadingId).remove();

            const aiResponse = data.candidates[0].content.parts[0].text;
            
            if(currentMode === 'worksheet') {
                renderWorksheet(aiResponse);
            } else {
                appendMessage('ai', aiResponse);
                chatHistory.push({user: text, ai: aiResponse}); // Onthoud de chat voor context
                if(chatHistory.length > 10) chatHistory.shift(); // Beperk geheugen voor snelheid
            }

        } catch (e) {
            if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            appendStatus("Error. Check je internet of API-keys.", "text-red-500");
        }
    }

    // Helper om berichten toe te voegen in Learning Mode
    function appendMessage(sender, text) {
        const output = document.getElementById('chat-output');
        const div = document.createElement('div');
        div.className = sender === 'user' 
            ? "p-4 bg-indigo-600/20 border border-indigo-500/30 rounded-2xl ml-auto max-w-[80%] text-right mb-4" 
            : "p-4 bg-white/5 border border-white/10 rounded-2xl mr-auto max-w-[80%] mb-4";
        
        div.innerHTML = `<div class="text-sm">${text.replace(/\n/g, '<br>')}</div>`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }
</script>
