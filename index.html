<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(150, 150, 150, 0.1); }
        .dark .glass { background: rgba(255, 255, 255, 0.03); }
        .light .glass { background: rgba(0, 0, 0, 0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="dark bg-slate-950 text-slate-200 min-h-screen">

    <nav class="border-b border-white/10 p-4 sticky top-0 bg-inherit backdrop-blur-lg z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg"><i data-lucide="sparkles" class="text-white w-5 h-5"></i></div>
                <span class="text-xl font-bold dark:text-white text-slate-900">AI<span class="text-blue-500">Learn</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-800/50 border border-white/10">
                    <i data-lucide="sun" id="sun-icon" class="hidden w-5 h-5 text-yellow-500"></i>
                    <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-blue-400"></i>
                </button>
                <div class="flex bg-slate-800/50 rounded-full p-1 border border-white/10">
                    <button onclick="setLanguage('en')" id="lang-en" class="px-3 py-1 rounded-full text-xs font-bold bg-blue-600 text-white">EN</button>
                    <button onclick="setLanguage('nl')" id="lang-nl" class="px-3 py-1 rounded-full text-xs font-bold text-slate-400">NL</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto pt-12 pb-8 px-4 text-center">
        <h1 id="hero-title" class="text-4xl md:text-6xl font-extrabold mb-4 dark:text-white text-slate-900">Learn with Gemini AI</h1>
        <p id="hero-subtitle" class="text-slate-500 dark:text-slate-400 text-lg">Select a subject to start an interactive AI session.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div onclick="openApp('cs')" class="glass p-8 rounded-3xl cursor-pointer hover:border-blue-500 transition-all group">
            <i data-lucide="code-2" class="text-blue-500 w-10 h-10 mb-4"></i>
            <h3 class="text-2xl font-bold mb-2 dark:text-white text-slate-900" id="t-cs">Computer Science</h3>
            <p class="text-sm text-slate-500" id="d-cs">Explain code, debug, or learn algorithms.</p>
        </div>
        <div onclick="openApp('nl')" class="glass p-8 rounded-3xl cursor-pointer hover:border-orange-500 transition-all group">
            <i data-lucide="book-open" class="text-orange-500 w-10 h-10 mb-4"></i>
            <h3 class="text-2xl font-bold mb-2 dark:text-white text-slate-900" id="t-nl">Dutch</h3>
            <p class="text-sm text-slate-500" id="d-nl">Sentence parsing and grammar check.</p>
        </div>
        <div onclick="openApp('en')" class="glass p-8 rounded-3xl cursor-pointer hover:border-emerald-500 transition-all group">
            <i data-lucide="languages" class="text-emerald-500 w-10 h-10 mb-4"></i>
            <h3 class="text-2xl font-bold mb-2 dark:text-white text-slate-900" id="t-en">English</h3>
            <p class="text-sm text-slate-500" id="d-en">Translation and conversation practice.</p>
        </div>
    </main>

    <div id="ai-modal" class="modal">
        <div class="glass w-full max-w-3xl p-6 md:p-10 rounded-3xl relative max-h-[90vh] flex flex-col">
            <button onclick="closeApp()" class="absolute top-6 right-6 text-slate-500 hover:text-red-500"><i data-lucide="x"></i></button>
            <h2 id="modal-title" class="text-3xl font-bold mb-2 dark:text-white text-slate-900 italic">AI Assistant</h2>
            <p id="modal-desc" class="text-slate-400 mb-6 border-b border-white/10 pb-4"></p>
            
            <div id="chat-output" class="flex-1 overflow-y-auto mb-4 space-y-4 text-sm leading-relaxed pr-2">
                <div class="p-4 rounded-2xl bg-blue-600/10 border border-blue-500/20 text-blue-400" id="welcome-msg">
                    Waiting for your input...
                </div>
            </div>

            <div class="flex gap-2">
                <input type="text" id="user-input" placeholder="Type here..." 
                       class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-blue-500 dark:text-white text-slate-900">
                <button onclick="askGemini()" class="bg-blue-600 hover:bg-blue-700 px-6 rounded-xl font-bold transition flex items-center gap-2">
                    <span>Send</span> <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDfJ-SSBSZ3ArpmNuw5MszfvBYUI0DIuUg";
        let currentSubject = '';
        let currentLang = 'en';

        const content = {
            en: {
                heroH: "Learn with Gemini AI", heroP: "Select a subject to start an interactive AI session.",
                csH: "Computer Science", csD: "Explain code, debug, or learn algorithms.",
                nlH: "Dutch", nlD: "Sentence parsing and grammar check.",
                enH: "English", enD: "Translation and conversation practice.",
                prompt_cs: "You are a Computer Science teacher. Explain this code or concept simply: ",
                prompt_nl: "Jij bent een docent Nederlands. Ontleed deze zin volledig (zinsdelen benoemen) of leg de grammatica uit: ",
                prompt_en: "You are an English teacher. Help the user with this English text or translate: "
            },
            nl: {
                heroH: "Leer met Gemini AI", heroP: "Kies een vak om een interactieve AI-sessie te starten.",
                csH: "Informatica", csD: "Code uitleggen, debuggen of algoritmes leren.",
                nlH: "Nederlands", nlD: "Zinsontleding en grammatica controle.",
                enH: "Engels", enD: "Vertalingen en gespreksoefeningen.",
                prompt_cs: "Je bent een docent Informatica. Leg deze code of dit concept simpel uit: ",
                prompt_nl: "Jij bent een docent Nederlands. Ontleed deze zin volledig (zinsdelen benoemen) of leg de grammatica uit: ",
                prompt_en: "You are an English teacher. Help the user with this English text or translate: "
            }
        };

        function setLanguage(l) {
            currentLang = l;
            const c = content[l];
            document.getElementById('hero-title').innerText = c.heroH;
            document.getElementById('hero-subtitle').innerText = c.heroP;
            document.getElementById('t-cs').innerText = c.csH; document.getElementById('d-cs').innerText = c.csD;
            document.getElementById('t-nl').innerText = c.nlH; document.getElementById('d-nl').innerText = c.nlD;
            document.getElementById('t-en').innerText = c.enH; document.getElementById('d-en').innerText = c.enD;
            
            document.getElementById('lang-en').className = l === 'en' ? 'px-3 py-1 rounded-full text-xs font-bold bg-blue-600 text-white' : 'px-3 py-1 rounded-full text-xs font-bold text-slate-400';
            document.getElementById('lang-nl').className = l === 'nl' ? 'px-3 py-1 rounded-full text-xs font-bold bg-blue-600 text-white' : 'px-3 py-1 rounded-full text-xs font-bold text-slate-400';
        }

        function openApp(subject) {
            currentSubject = subject;
            document.getElementById('modal-title').innerText = content[currentLang][subject + 'H'];
            document.getElementById('modal-desc').innerText = content[currentLang][subject + 'D'];
            document.getElementById('ai-modal').classList.add('active');
            document.getElementById('chat-output').innerHTML = '';
        }

        function closeApp() { document.getElementById('ai-modal').classList.remove('active'); }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('chat-output');
            const text = input.value.trim();
            if(!text) return;

            const userMsg = document.createElement('div');
            userMsg.className = "p-3 bg-white/5 rounded-xl border border-white/10 ml-8 text-right";
            userMsg.innerText = text;
            output.appendChild(userMsg);
            input.value = '';

            const loading = document.createElement('div');
            loading.innerText = "...Thinking...";
            output.appendChild(loading);

            try {
                const prompt = content[currentLang]['prompt_' + currentSubject] + text;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                loading.remove();
                
                const aiMsg = document.createElement('div');
                aiMsg.className = "p-4 bg-blue-600/10 border border-blue-500/20 rounded-xl mr-8 text-slate-300";
                aiMsg.innerText = data.candidates[0].content.parts[0].text;
                output.appendChild(aiMsg);
                output.scrollTop = output.scrollHeight;

            } catch (e) {
                loading.innerText = "Error: API limit or Key issue.";
            }
        }

        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('dark');
            const isDark = b.classList.contains('dark');
            b.classList.toggle('bg-slate-950', isDark);
            b.classList.toggle('text-slate-200', isDark);
            b.classList.toggle('bg-slate-50', !isDark);
            b.classList.toggle('text-slate-900', !isDark);
            document.getElementById('sun-icon').classList.toggle('hidden', isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', !isDark);
        }

        lucide.createIcons();
    </script>
</body>
</html>
