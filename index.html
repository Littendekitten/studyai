<style>
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .result-tag { background: #3b82f6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-top: 4px; display: inline-block; }
</style>

<div id="analyzer-modal" class="modal p-4">
    <div class="glass w-full max-w-2xl p-8 rounded-3xl shadow-2xl relative">
        <button onclick="closeAnalyzer()" class="absolute top-4 right-4 text-slate-500 hover:text-white">
            <i data-lucide="x"></i>
        </button>
        
        <h2 class="text-2xl font-bold mb-4 dark:text-white text-slate-900">Zinsontleding AI</h2>
        <p class="text-slate-400 mb-6 text-sm">Typ een Nederlandse zin en de AI splitst deze in zinsdelen.</p>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="sentence-input" placeholder="Bijv: De jongen geeft de hond een koekje." 
                   class="flex-1 bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition">
            <button onclick="analyzeSentence()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition">Analyseer</button>
        </div>

        <div id="analysis-result" class="space-y-4">
            </div>
    </div>
</div>

<script>
// --- LOGICA VOOR ZINSONTLEDING ---

// Koppel de "Start" knop van Nederlands aan de modal
document.getElementById('btn-nl-action').onclick = function() {
    document.getElementById('analyzer-modal').classList.add('active');
};

function closeAnalyzer() {
    document.getElementById('analyzer-modal').classList.remove('active');
}

function analyzeSentence() {
    const sentence = document.getElementById('sentence-input').value.trim();
    if (!sentence) return;

    const words = sentence.replace(/[.!?]/g, '').split(' ');
    const resultDiv = document.getElementById('analysis-result');
    resultDiv.innerHTML = '<div class="animate-pulse text-blue-400">Analyseren...</div>';

    // Simuleer AI vertraging
    setTimeout(() => {
        const analysis = performParsing(words);
        renderAnalysis(analysis, resultDiv);
    }, 600);
}

function performParsing(words) {
    // Simpele database voor de demo-logica
    const articles = ['de', 'het', 'een', 'hetgeen'];
    const verbs = ['loopt', 'geeft', 'is', 'werkt', 'leert', 'maakt', 'zwemt', 'leest'];
    
    let analysis = [];
    let i = 0;

    while (i < words.length) {
        let part = { word: words[i], role: 'Onbekend' };
        let lowerWord = words[i].toLowerCase();

        // 1. Lidwoord + Zelfst. Naamwoord (Onderwerp/Object)
        if (articles.includes(lowerWord) && i + 1 < words.length) {
            part.word = words[i] + " " + words[i+1];
            part.role = (i === 0) ? "Onderwerp (Subj.)" : "Lijdend Voorwerp (Obj.)";
            i += 2;
        } 
        // 2. Werkwoorden (Persoonsvorm)
        else if (verbs.includes(lowerWord)) {
            part.role = "Persoonsvorm (PV)";
            i++;
        }
        // 3. Losse woorden
        else {
            part.role = "Zinsdeel";
            i++;
        }
        analysis.push(part);
    }
    return analysis;
}

function renderAnalysis(analysis, container) {
    container.innerHTML = '<div class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>';
    const grid = container.firstChild;

    analysis.forEach(item => {
        const card = document.createElement('div');
        card.className = 'p-3 bg-white/5 rounded-xl border border-white/5';
        card.innerHTML = `
            <div class="text-lg font-semibold dark:text-white text-slate-900">${item.word}</div>
            <div class="result-tag">${item.role}</div>
        `;
        grid.appendChild(card);
    });
}
</script>
